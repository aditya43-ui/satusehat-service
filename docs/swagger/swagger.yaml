        in: query
        name: page
        type: integer
      - description: 'Jumlah Data (default: 10)'
        in: query
        name: size
        type: integer
      - description: Tipe Produk (farmasi/alkes)
        in: query
        name: product_type
        type: string
      - description: Kata Kunci Pencarian
        in: query
        name: keyword
        type: string
      - description: Parameter waktu (from_)
