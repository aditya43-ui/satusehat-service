      security:
      - BearerAuth: []
      summary: Delete a RoleMaster
      tags:
      - roles
    get:
      description: Retrieve detailed information about a specific RoleMaster
      parameters:
      - description: RoleMaster ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
