basePath: /api/v1
definitions:
  response.Response:
    properties:
      data: {}
      error: {}
      message:
        type: string
      meta: {}
      status:
        type: string
    type: object
  service_internal_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  service_internal_auth.RefreshTokenRequest:
    properties:
      provider:
        description: |-
          Provider membantu membedakan antara "jwt" dan "keycloak".
          Ini membuat endpoint menjadi fleksibel.
        enum:
        - jwt
        - keycloak
        type: string
      refresh_token:
        type: string
    required:
    - provider
    - refresh_token
    type: object
  service_internal_auth.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      role_id:
        type: integer
    required:
    - email
    - name
    - password
    - role_id
    type: object
  service_internal_master_role_master.RoleMasterRequest:
    properties:
      active:
        type: boolean
      created_at:
        type: string
      name:
        type: string
      select: {}
      updated_at:
        type: string
    type: object
  service_internal_master_role_pages.RolPagesRequest:
    properties:
      active:
        type: boolean
      icon:
        maxLength: 100
        type: string
      level:
        minimum: 0
        type: integer
      name:
        maxLength: 20
        type: string
      parent:
        type: integer
      sort:
        minimum: 0
        type: integer
      url:
        type: string
    required:
    - level
    - name
    - sort
    - url
    type: object
  service_internal_master_role_permission.RolPermissionRequest:
    properties:
      active:
        type: boolean
      create:
        type: boolean
      delete:
        type: boolean
      disable:
        type: boolean
      fk_rol_pages_id:
        type: integer
      group_keycloak:
        type: string
      read:
        type: boolean
      role_keycloak:
        type: string
      update:
        type: boolean
    type: object
  service_internal_satusehat_reference_patient.CreatePatientRequest:
    properties:
      address:
        description: Opsional
        type: string
      birth_date:
        description: 'Format: YYYY-MM-DD'
        type: string
      gender:
        description: male, female, other, unknown
        type: string
      name:
        type: string
      nik:
        type: string
      phone:
        description: Opsional
        type: string
    required:
    - birth_date
    - gender
    - name
    - nik
    type: object
info:
  contact:
    email: support@example.com
    name: API Support
  description: REST API for Service General including Multi-DB, BPJS, and SatuSehat
    integrations.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: GoPrint Service General API
  version: 1.0.0
paths:
  /auth/info:
    get:
      description: Retrieve information about the currently active token/user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Get Token Info
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT & Refresh tokens
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service_internal_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      description: Logout current user and blacklist the token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh expired access token using refresh token
      parameters:
      - description: Refresh token payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service_internal_auth.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: Refresh Token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/service_internal_auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.Response'
      summary: Register user
      tags:
      - auth
  /roles/master:
    get:
      description: Retrieve a paginated list of RoleMaster
      parameters:
      - default: 10
        description: Number of items per page
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      - description: Sort fields (e.g. +name,-created_at)
