      security:
      - BearerAuth: []
      summary: Get RoleMaster detail
      tags:
      - roles
    put:
      consumes:
      - application/json
      description: Update details of an existing RoleMaster record by ID
      parameters:
      - description: RoleMaster ID
        in: path
        name: id
        required: true
        type: integer
      - description: Payload
